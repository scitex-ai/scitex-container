name: import-smoke

# Catches "wheel installs but `import scitex_container` blows up at
# runtime" — separate from the full pytest suite so a broken
# entry-point fails fast without paying for the matrix.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  install-check:
    name: import-smoke-on-ubuntu-py3-12
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel + install in fresh venv + import
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
          python -m venv /tmp/clean-venv
          /tmp/clean-venv/bin/pip install --upgrade pip
          /tmp/clean-venv/bin/pip install dist/*.whl
          IMPORT_NAME=$(find src -maxdepth 2 -name __init__.py -printf '%h\n' \
                          | head -1 | xargs -n1 basename)
          if [ -z "$IMPORT_NAME" ]; then
              echo "Could not detect import name under src/" >&2
              exit 1
          fi
          echo "Importing $IMPORT_NAME ..."
          /tmp/clean-venv/bin/python -c "import ${IMPORT_NAME}; print(f'OK: {${IMPORT_NAME}.__name__}')"
