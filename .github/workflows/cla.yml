name: CLA Assistant

# PILOT: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10).
# Triggers/permissions preserved verbatim from the prior local file.
# owner_allowlist override: this repo's prior allowlist was
# "bot*,ywatanabe1989,LLEmacs" (default is "bot*,ywatanabe1989"), so it is
# passed explicitly below. default_branch/owner_login defaults (main /
# ywatanabe1989) already match this repo's prior hardcoded values.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]
  push:
    branches: [main, develop]
    tags: ['v*']

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  call:
    uses: scitex-ai/.github/.github/workflows/cla.yml@main
    with:
      owner_allowlist: "bot*,ywatanabe1989,LLEmacs"
    secrets: inherit
